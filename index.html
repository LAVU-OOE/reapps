<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVU OÖ - App Drawer</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <div class="dashboard-container">
        <!-- Header Controls -->
        <header class="dashboard-header">
            <div class="brand">
                <img src="assets/icons/LAVU_logo.png" alt="LAVU Logo" class="logo" onerror="this.style.display='none'">
                <h1 id="titleText">Anwendungs-Verzeichnis</h1>
            </div>
            <div class="language-selector">
                <button onclick="setLanguage('de')" id="langBtnDe" class="lang-btn active">DE</button>
                <button onclick="setLanguage('en')" id="langBtnEn" class="lang-btn">EN</button>
            </div>
        </header>

        <!-- Main App Grid Container -->
        <main class="app-grid" id="app-grid">
            <!-- JavaScript dynamically renders apps and the 'Add App' placeholder card here -->
            <div class="grid-loading" id="gridLoading">Lade Anwendungen...</div>
        </main>
    </div>

    <!-- Add Application Modal Overlay -->
    <div class="modal-overlay hidden" id="addAppModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2 id="modalTitle">Neue App hinzufügen</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <form id="addAppForm" onsubmit="handleFormSubmit(event)">
                <div class="form-group">
                    <label for="appName" id="labelName">Name der Anwendung *</label>
                    <input type="text" id="appName" required placeholder="z.B. Label Studio">
                </div>
                <div class="form-group">
                    <label for="appUrl" id="labelUrl">Anwendungs-URL (Link) *</label>
                    <input type="url" id="appUrl" required placeholder="https://example.com">
                </div>
                <div class="form-group">
                    <label for="appDesc" id="labelDesc">Beschreibung</label>
                    <textarea id="appDesc" rows="3" placeholder="Kurze Beschreibung der Funktion..."></textarea>
                </div>
                <div class="form-group">
                    <label for="appIcon" id="labelIcon">Emoji Icon</label>
                    <input type="text" id="appIcon" maxlength="4" placeholder="z.B. 🏷️, 📦, 💻 (Standard: 🚀)">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()" id="btnCancel">Abbrechen</button>
                    <button type="submit" class="btn btn-primary" id="submitBtn">Speichern</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
